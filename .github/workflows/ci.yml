name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - grammar.js
      - src/**
      - test/**
      - queries/**
      - tmpl/**
      - bindings/**
      - binding.gyp
      - package.json
      - scripts/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    name: Test parser — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2

      - name: Run corpus tests
        shell: bash
        run: tree-sitter test && tree-sitter test -p tmpl

  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated files are up to date
        run: |
          npx tree-sitter generate
          npx tree-sitter generate tmpl/grammar.js --output tmpl/src
          git diff --exit-code src/ tmpl/src/

      - name: Checkout ucode language test suite
        uses: actions/checkout@v6
        with:
          repository: jow-/ucode
          path: ucode-lang
          sparse-checkout: tests/custom
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Validate grammar against ucode test corpus
        run: node scripts/validate-corpus.js corpus ucode-lang/tests/custom

      - name: Checkout firewall4
        uses: actions/checkout@v6
        with:
          repository: openwrt/firewall4
          path: firewall4
          fetch-depth: 1

      - name: Validate grammar against firewall4
        run: node scripts/validate-corpus.js project firewall4

  wasm:
    name: Build WASM
    needs: [test, validate]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache wasi-sdk
        uses: actions/cache@v5
        with:
          path: ~/.cache/tree-sitter
          key: wasi-sdk-${{ hashFiles('package-lock.json') }}

      - name: Build WASM
        run: |
          npx tree-sitter build --wasm .
          npx tree-sitter build --wasm tmpl

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: "*.wasm"

  prebuild:
    name: Prebuild — ${{ matrix.os }} ${{ matrix.arch }}
    needs: [test, validate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: x64   }
          - { os: macos-latest,  arch: arm64 }
          - { os: windows-2022,  arch: x64   }

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install cross-compiler (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build linux-x64
        if: matrix.os == 'ubuntu-latest'
        run: npx prebuildify --napi --strip --arch x64

      - name: Build linux-arm64
        if: matrix.os == 'ubuntu-latest'
        run: |
          npx prebuildify --napi --arch arm64
          aarch64-linux-gnu-strip prebuilds/linux-arm64/*.node
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++

      - name: Build prebuilt binary
        if: matrix.os != 'ubuntu-latest'
        run: npx prebuildify --napi --strip

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/

  publish:
    name: Publish to npm
    needs: [wasm, prebuild]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # required for npm provenance via OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download WASM
        uses: actions/download-artifact@v8
        with:
          name: wasm
          path: .

      - name: Download prebuilds
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          path: prebuilds
          merge-multiple: true

      - name: Publish to npm
        run: npm publish --provenance
