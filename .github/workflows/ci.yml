name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated files are up to date
        run: |
          npx tree-sitter generate
          npx tree-sitter generate tmpl/grammar.js --output tmpl/src
          git diff --exit-code src/ tmpl/src/

      - name: Run corpus tests
        run: npm test

      - name: Checkout ucode language test suite
        uses: actions/checkout@v4
        with:
          repository: jow-/ucode
          path: ucode-lang
          sparse-checkout: tests/custom
          sparse-checkout-cone-mode: false
          depth: 1

      - name: Validate grammar against ucode test corpus
        run: node scripts/validate-corpus.js corpus ucode-lang/tests/custom

      - name: Checkout firewall4
        uses: actions/checkout@v4
        with:
          repository: openwrt/firewall4
          path: firewall4
          depth: 1

      - name: Validate grammar against firewall4
        run: node scripts/validate-corpus.js project firewall4

  prebuild:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x64   }
          - { os: ubuntu-24.04-arm, arch: arm64 }
          - { os: macos-latest,     arch: arm64 }
          - { os: macos-13,         arch: x64   }
          - { os: windows-latest,   arch: x64   }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build prebuilt binary
        run: npx prebuildify --napi --strip

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/
